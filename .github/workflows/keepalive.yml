name: Keepalive
on:
  schedule:
    - cron: '0 0 1 * *'  # monthly is enough
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "keepalive"
          git push
          